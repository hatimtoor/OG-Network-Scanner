# NetScope via Docker.
#   docker compose up -d      # start
#   open http://localhost:8000
#
# host networking (Linux) lets the container see your LAN for discovery.
# On Docker Desktop (Windows/macOS) host networking is limited — the dashboard
# works but LAN discovery is best on a Linux host or a Raspberry Pi.
services:
  netscope:
    build: .
    image: netscope:latest
    container_name: netscope
    network_mode: host          # required for LAN discovery (Linux)
    cap_add:
      - NET_RAW                  # scapy ARP / passive capture
      - NET_ADMIN
    environment:
      - NETSCOPE_HOST=0.0.0.0
      - NETSCOPE_OPEN_BROWSER=false
    volumes:
      - netscope-data:/data
    restart: unless-stopped

volumes:
  netscope-data:
