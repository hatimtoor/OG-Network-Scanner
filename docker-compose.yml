# NetScope via Docker.
#   docker compose up -d      # start
#   open http://localhost:8000
#
# host networking (Linux) lets the container see your LAN for discovery.
# On Docker Desktop (Windows/macOS) host networking is limited — the dashboard
# works but LAN discovery is best on a Linux host or a Raspberry Pi.
services:
  netscope:
    build: .
    image: netscope:latest
    container_name: netscope
    network_mode: host          # required for LAN discovery (Linux)
    cap_add:
      - NET_RAW                  # scapy ARP / passive capture
      - NET_ADMIN
    environment:
      - NETSCOPE_OPEN_BROWSER=false
      # SECURITY: with host networking, binding 0.0.0.0 exposes NetScope on your
      # LAN. That is only allowed WITH authentication. To reach the dashboard from
      # another machine, uncomment all three lines below and set a real password:
      # - NETSCOPE_HOST=0.0.0.0
      # - NETSCOPE_AUTH=true
      # - NETSCOPE_PASSWORD=please-change-me
      #
      # Left as-is, the container binds 127.0.0.1 (reachable only from this host).
    volumes:
      - netscope-data:/data
    restart: unless-stopped

volumes:
  netscope-data:
